run:
  name: "craft_villageragent_qwen"
  seed: 3
  output_dir: "result/craft"
  structures: [0]
  turns: 5

craft:
  repo_path: "external/CRAFT"
  dataset_path: "external/CRAFT/data/structures_dataset_20.json"
  use_oracle: true
  oracle_n: 5
  builder_tool_use: false
  preserve_partial_observation: true
  use_common_ground: false

villageragent:
  enabled: true
  role: "directors"
  num_agents: 3
  use_task_decomposer: true
  use_agent_controller: true
  use_state_manager: true
  use_reflection: true
  expose_private_views_to_global_state: false
  expose_target_structure: false
  expose_oracle_moves: false
  director_ids:
    - "D1"
    - "D2"
    - "D3"

models:
  director:
    provider: "openai_compatible"
    model: "qwen3.5:9b"
    base_url: "https://ollama.arc.upiscium.dev/v1"
    api_key: "ollama"
    temperature: 0.2
    max_tokens: 2000
  builder:
    provider: "openai_compatible"
    model: "gpt-4o-mini"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    temperature: 0.0
    max_tokens: 1000

logging:
  save_prompts: true
  save_internal_reasoning: false
  save_raw_craft_outputs: true
  save_leakage_report: true
