experiment:
  name: "craft_qwen_robustness_v1"
  result_root: "result/craft"
  runs:
    - config: "configs/craft/eval_qwen_ollama.yaml"
      suffix: "_robust"
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: "configs/craft/eval_qwen_ollama_dual_dag.yaml"
      suffix: "_robust"
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: "configs/craft/single_director_qwen_ollama_dual_dag.yaml"
      suffix: "_robust"
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: "configs/craft/official_baseline.yaml"
      suffix: "_robust"
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
  report:
    output: "result/craft/comparison_qwen_robustness_v1.csv"
    json_output: "result/craft/comparison_qwen_robustness_v1.json"
    compact_summary_output: "result/craft/summary_qwen_robustness_v1.csv"
    compact_summary_json_output: "result/craft/summary_qwen_robustness_v1.json"
    variance_summary_output: "result/craft/variance_qwen_robustness_v1.csv"
    variance_summary_json_output: "result/craft/variance_qwen_robustness_v1.json"
