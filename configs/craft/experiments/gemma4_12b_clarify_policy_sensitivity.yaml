experiment:
  name: craft_gemma4_12b_clarify_policy_sensitivity
  description: Oracle-count and horizon sensitivity for available Clarify policies.
  result_root: result/craft
  continue_on_error: true
  overrides:
    turns: 20
  runs:
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_retrieval.yaml
      suffix: _clarify_disabled_oracle1_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag.yaml
      suffix: _current_clarify_oracle1_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_clarify_throughput_fix.yaml
      suffix: _throughput_fix_oracle1_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_value_of_information.yaml
      suffix: _value_of_information_oracle1_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_retrieval.yaml
      suffix: _clarify_disabled_oracle3_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 3
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag.yaml
      suffix: _current_clarify_oracle3_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 3
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_clarify_throughput_fix.yaml
      suffix: _throughput_fix_oracle3_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 3
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_value_of_information.yaml
      suffix: _value_of_information_oracle3_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 3
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_retrieval.yaml
      suffix: _clarify_disabled_oracle5_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 5
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag.yaml
      suffix: _current_clarify_oracle5_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 5
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_clarify_throughput_fix.yaml
      suffix: _throughput_fix_oracle5_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 5
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_value_of_information.yaml
      suffix: _value_of_information_oracle5_turn20
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        craft:
          oracle_n: 5
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag.yaml
      suffix: _current_clarify_oracle5_turn30
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        turns: 30
        craft:
          oracle_n: 5
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_clarify_throughput_fix.yaml
      suffix: _throughput_fix_oracle5_turn30
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        turns: 30
        craft:
          oracle_n: 5
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_value_of_information.yaml
      suffix: _value_of_information_oracle5_turn30
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
      overrides:
        turns: 30
        craft:
          oracle_n: 5
  report:
    output: result/craft/comparison_gemma4_12b_clarify_policy_sensitivity.csv
    json_output: result/craft/comparison_gemma4_12b_clarify_policy_sensitivity.json
    compact_summary_output: result/craft/summary_gemma4_12b_clarify_policy_sensitivity.csv
    compact_summary_json_output: result/craft/summary_gemma4_12b_clarify_policy_sensitivity.json
    variance_summary_output: result/craft/variance_gemma4_12b_clarify_policy_sensitivity.csv
    variance_summary_json_output: result/craft/variance_gemma4_12b_clarify_policy_sensitivity.json
    variance_group_by: run_group
