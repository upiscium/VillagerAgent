experiment:
  name: craft_gemma4_12b_dual_dag_ablation_smoke
  description: C0-C3 diagnostic smoke ablation; C4-C6 gating/coordination ablations are staged separately.
  result_root: result/craft
  continue_on_error: true
  overrides:
    structures: [0, 1, 2, 3, 4]
    turns: 5
    run_name_suffix: _ablation_smoke
  runs:
    - config: configs/craft/eval_gemma4_12b_ollama.yaml
      suffix: _c0_va_baseline
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_metadata_only.yaml
      suffix: _c1_metadata_only
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_current_evidence.yaml
      suffix: _c2_current_evidence
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag_retrieval.yaml
      suffix: _c3_retrieval
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
  report:
    output: result/craft/comparison_gemma4_12b_dual_dag_ablation_smoke.csv
    json_output: result/craft/comparison_gemma4_12b_dual_dag_ablation_smoke.json
    compact_summary_output: result/craft/summary_gemma4_12b_dual_dag_ablation_smoke.csv
    compact_summary_json_output: result/craft/summary_gemma4_12b_dual_dag_ablation_smoke.json
    variance_summary_output: result/craft/variance_gemma4_12b_dual_dag_ablation_smoke.csv
    variance_summary_json_output: result/craft/variance_gemma4_12b_dual_dag_ablation_smoke.json
    variance_group_by: run_group
