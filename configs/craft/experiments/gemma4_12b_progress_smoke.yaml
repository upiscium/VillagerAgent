experiment:
  name: craft_gemma4_12b_progress_smoke
  description: Diagnostic smoke run only; do not report as final CRAFT progress performance.
  result_root: result/craft
  continue_on_error: true
  overrides:
    structures: [0, 1, 2, 3, 4]
    turns: 5
    run_name_suffix: _progress_smoke
  runs:
    - config: configs/craft/official_baseline_gemma4_12b_ollama.yaml
      suffix: _official
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama.yaml
      suffix: _baseline
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
    - config: configs/craft/eval_gemma4_12b_ollama_dual_dag.yaml
      suffix: _dual_dag
      seeds: [1, 3, 5]
      structures: [0, 1, 2, 3, 4]
  report:
    output: result/craft/comparison_gemma4_12b_progress_smoke.csv
    json_output: result/craft/comparison_gemma4_12b_progress_smoke.json
    compact_summary_output: result/craft/summary_gemma4_12b_progress_smoke.csv
    compact_summary_json_output: result/craft/summary_gemma4_12b_progress_smoke.json
    variance_summary_output: result/craft/variance_gemma4_12b_progress_smoke.csv
    variance_summary_json_output: result/craft/variance_gemma4_12b_progress_smoke.json
    variance_group_by: run_group
